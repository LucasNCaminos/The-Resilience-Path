<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Lucas Nahuel Caminos | Project Documentation" }}</title>
    <link rel="icon" type="image/png" href="/The-Resilience-Path/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>

        :root {
            --bg-color: #080c16; 
            --card-bg: #111827; 
            --accent-color: #00f2fe; 
            --text-main: #f3f4f6; 
            --text-secondary: #cbd5e1; 
            --border-color: #374151; 
            --console-green: #2ecc71; 
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            line-height: 1.7;
        }


        .content-container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: rgba(17, 24, 39, 0.4);
            padding: 40px 50px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }


        h1, h2, h3, h4 { color: var(--accent-color); font-weight: 600; margin-top: 35px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        h1 { font-size: 2.2rem; color: #fff; border-bottom: 2px solid var(--accent-color); }
        
        a { color: var(--accent-color); text-decoration: none; }
        a:hover { color: #fff; text-decoration: underline; }


        code {
            font-family: 'JetBrains Mono', monospace;
            background-color: #0d1117;
            color: var(--console-green);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre {
            background-color: #0d1117;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow-x: auto;
            margin: 25px 0;
        }

        pre code { background-color: transparent; color: var(--text-secondary); padding: 0; }


       
        table { 
            width: 100%; 
            margin: 25px 0; 
            border-collapse: collapse; 
            display: block; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        table th { background-color: var(--card-bg); color: var(--accent-color); font-weight: 600; text-align: left; white-space: nowrap; }
        table th, table td { padding: 12px 15px; border: 1px solid var(--border-color); }
        img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border-color); margin: 20px 0; }
        
        blockquote { border-left: 4px solid var(--accent-color); padding-left: 20px; color: var(--text-secondary); font-style: italic; background: rgba(0, 242, 254, 0.05); padding: 15px 20px; border-radius: 0 8px 8px 0; }


        .top-nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .back-btn, .repo-btn {
            display: inline-flex;
            align-items: center;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 6px;
            transition: all 0.3s;
            background: rgba(17, 24, 39, 0.6);
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }


        .repo-btn:hover {
            background: rgba(46, 204, 113, 0.1); 
            border-color: var(--console-green);
            color: var(--console-green);
        }
    </style>
</head>
<body>

    <div class="content-container">
        
        <div class="top-nav-buttons">
            <a href="https://lucasncaminos.github.io/The-Resilience-Path/" class="back-btn">← RETURN TO HEADQUARTERS</a>
            <a href="https://github.com/lucasncaminos/The-Resilience-Path/tree/main{{ page.dir }}" target="_blank" rel="noopener noreferrer" class="repo-btn">/> ACCESS SOURCE FILES</a>
        </div>

        {{ content }}
        
    </div>

</body>
</html>
